name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check src/ tests/ && uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run mypy src/mcp_brasil/

      - name: Test
        run: uv run pytest -v

  publish:
    name: Publish to PyPI
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Smoke test
        run: |
          uv run --with ./dist/*.whl --no-project -- python -c "import mcp_brasil; print(mcp_brasil.__version__)"

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

  github-release:
    name: Create GitHub Release
    needs: [ci, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes-file RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
